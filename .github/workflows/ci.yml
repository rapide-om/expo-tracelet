name: CI

on:
    pull_request:
    push:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    test:
        name: Lint, Typecheck & Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check formatting
              run: bun run format:check

            - name: Lint
              run: bun run lint

            - name: Type check
              run: bun run typecheck

            - name: Build
              run: bun run build

    validate-android:
        name: Validate Android module
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17

            - name: Cache Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Validate build.gradle pins Tracelet SDK version
              run: |
                  # Sanity check: build.gradle declares a `TRACELET_SDK_VERSION`
                  # constant pinned to a specific minor.patch and uses it via
                  # ${TRACELET_SDK_VERSION} in the dependency declaration. We
                  # can't do a full compile here without an Expo app + Android
                  # SDK harness, but this catches accidental version drift.
                  test -f android/build.gradle
                  grep -E "TRACELET_SDK_VERSION\s*=\s*'[0-9]+\.[0-9]+\.[0-9]+'" android/build.gradle \
                    || (echo "::error::TRACELET_SDK_VERSION not pinned in android/build.gradle"; exit 1)
                  grep -E 'com\.ikolvi:tracelet-sdk:\$\{TRACELET_SDK_VERSION\}' android/build.gradle \
                    || (echo "::error::tracelet-sdk dependency does not use \${TRACELET_SDK_VERSION}"; exit 1)
