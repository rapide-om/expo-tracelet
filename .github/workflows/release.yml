name: Release

# Triggered when a commit on `main` starts with `chore(release):`. The version
# is read from package.json — bump it in the same commit. Standard pattern
# (matches Expo's own packages and many published Expo Modules).

on:
    push:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write

jobs:
    release:
        name: Release
        if: github.repository_owner == 'rapide-om' && startsWith(github.event.head_commit.message, 'chore(release):')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node (for npm CLI + provenance)
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: 'https://registry.npmjs.org/'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check formatting
              run: bun run format:check

            - name: Lint
              run: bun run lint

            - name: Type check
              run: bun run typecheck

            - name: Build
              run: bun run build

            - name: Extract version from package.json
              id: version
              run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            - name: Verify tag does not already exist
              run: |
                  if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
                    echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump package.json before releasing."
                    exit 1
                  fi

            - name: Publish to npm
              # `--provenance` requires `id-token: write` (set above). Package's
              # `publishConfig.access` is `public` so scoped publish works directly.
              run: npm publish --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Extract changelog notes
              id: changelog
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  NOTES=$(awk -v v="$VERSION" '
                    $0 ~ "^## \\[" v "\\]" { found=1; next }
                    found && /^## \[/ { exit }
                    found { print }
                  ' CHANGELOG.md)
                  {
                    echo "notes<<__EOF_NOTES__"
                    echo "$NOTES"
                    echo "__EOF_NOTES__"
                  } >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  name: v${{ steps.version.outputs.version }}
                  body: ${{ steps.changelog.outputs.notes }}
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
