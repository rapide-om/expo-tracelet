version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
      open-pull-requests-limit: 5
      labels: ['dependencies']
      groups:
          expo:
              patterns:
                  - 'expo*'
                  - '@expo/*'
          dev:
              dependency-type: 'development'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'monthly'
      labels: ['dependencies', 'ci']
